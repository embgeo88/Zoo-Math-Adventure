<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Upright stance: standing on hind legs — the defining meerkat pose -->
  <!-- Lower body / haunches -->
  <ellipse cx="50" cy="80" rx="14" ry="10" fill="#C8A96E"/>
  <!-- Torso -->
  <rect x="38" y="52" width="24" height="30" rx="10" fill="#C8A96E"/>
  <!-- Pale belly -->
  <ellipse cx="50" cy="68" rx="9" ry="14" fill="#EDD9A3"/>
  <!-- Head -->
  <ellipse cx="50" cy="40" rx="15" ry="14" fill="#C8A96E"/>
  <!-- Ears -->
  <ellipse cx="36" cy="30" rx="5" ry="7" fill="#A07840"/>
  <ellipse cx="64" cy="30" rx="5" ry="7" fill="#A07840"/>
  <ellipse cx="36" cy="30" rx="3" ry="5" fill="#C8A96E"/>
  <ellipse cx="64" cy="30" rx="3" ry="5" fill="#C8A96E"/>
  <!-- Dark eye patches — the signature meerkat feature -->
  <ellipse cx="42" cy="40" rx="7" ry="6" fill="#5D3A1A"/>
  <ellipse cx="58" cy="40" rx="7" ry="6" fill="#5D3A1A"/>
  <!-- Eyes -->
  <circle cx="42" cy="40" r="3.5" fill="#1A1A1A"/>
  <circle cx="41" cy="39" r="1.2" fill="white"/>
  <circle cx="58" cy="40" r="3.5" fill="#1A1A1A"/>
  <circle cx="57" cy="39" r="1.2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="48" rx="3" ry="2" fill="#7B4F25"/>
  <!-- Arms raised slightly — alert/sentinel pose -->
  <path d="M38 62 Q28 56 26 50" stroke="#C8A96E" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M62 62 Q72 56 74 50" stroke="#C8A96E" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Hind feet -->
  <ellipse cx="43" cy="90" rx="6" ry="4" fill="#A07840"/>
  <ellipse cx="57" cy="90" rx="6" ry="4" fill="#A07840"/>
  <!-- Tail on ground behind -->
  <path d="M50 82 Q62 88 68 84" stroke="#A07840" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
