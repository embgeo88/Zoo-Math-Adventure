<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Kookaburra: cream/white head, brown back, HUGE DAGGER BEAK (kingfisher family), brown eye stripe -->
  <!-- Body -->
  <ellipse cx="50" cy="66" rx="22" ry="18" fill="#6D4C41"/>
  <!-- Cream/white underparts -->
  <ellipse cx="50" cy="68" rx="16" ry="14" fill="#FFF9C4"/>
  <!-- Head — large, rounded -->
  <ellipse cx="30" cy="44" rx="22" ry="19" fill="#FFF9C4"/>
  <!-- Brown cap on top of head -->
  <ellipse cx="30" cy="32" rx="20" ry="12" fill="#5D4037"/>
  <!-- Brown back/wings -->
  <ellipse cx="62" cy="56" rx="18" ry="14" fill="#5D4037"/>
  <!-- Blue wing patches (kookaburra has blue!) -->
  <ellipse cx="68" cy="60" rx="8" ry="6" fill="#1565C0" opacity="0.7"/>
  <!-- DISTINCTIVE BROWN EYE STRIPE through eye -->
  <rect x="8" y="41" width="40" height="8" rx="4" fill="#5D4037"/>
  <!-- Eyes — above the dark stripe -->
  <circle cx="24" cy="38" r="5" fill="#1A1A1A"/>
  <circle cx="22.5" cy="36.5" r="1.8" fill="white"/>
  <!-- HUGE BEAK — the most obvious feature, very large relative to head -->
  <!-- Upper mandible -->
  <path d="M10 44 L-4 50 L10 53 Z" fill="#8D6E63"/>
  <!-- Lower mandible -->
  <path d="M10 53 L-2 56 L10 57 Z" fill="#A1887F"/>
  <!-- Ridge on upper beak -->
  <line x1="10" y1="44" x2="-4" y2="50" stroke="#6D4C41" stroke-width="1"/>
  <!-- Tail — barred pattern -->
  <path d="M68 66 L88 62 L88 74 L68 76 Z" fill="#5D4037"/>
  <line x1="70" y1="67" x2="88" y2="63" stroke="#8D6E63" stroke-width="1.5" opacity="0.7"/>
  <line x1="70" y1="71" x2="88" y2="68" stroke="#8D6E63" stroke-width="1.5" opacity="0.7"/>
  <!-- Legs / feet perching on branch -->
  <rect x="40" y="82" width="5" height="10" rx="2" fill="#8D6E63"/>
  <rect x="52" y="82" width="5" height="10" rx="2" fill="#8D6E63"/>
</svg>
