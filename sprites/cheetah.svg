<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cheetah: slim build, small solid spots, BLACK TEAR MARKS — what sets it apart from all other big cats -->
  <!-- Body — lean and low -->
  <ellipse cx="58" cy="62" rx="28" ry="14" fill="#E8C46A"/>
  <!-- Head — smaller than lion/leopard -->
  <ellipse cx="25" cy="54" rx="15" ry="13" fill="#E8C46A"/>
  <!-- Tail — long and curved -->
  <path d="M86 62 Q96 55 94 46 Q92 40 88 42" stroke="#E8C46A" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Legs -->
  <rect x="33" y="72" width="6" height="18" rx="3" fill="#D4A843"/>
  <rect x="46" y="72" width="6" height="18" rx="3" fill="#D4A843"/>
  <rect x="61" y="72" width="6" height="18" rx="3" fill="#D4A843"/>
  <rect x="74" y="72" width="6" height="18" rx="3" fill="#D4A843"/>
  <!-- Eyes -->
  <circle cx="20" cy="50" r="4" fill="#6B4226"/>
  <circle cx="19" cy="49" r="1.5" fill="white"/>
  <!-- TEAR MARKS: black lines from inner eye corner to mouth — unique to cheetah -->
  <path d="M18 54 Q17 60 17 66" stroke="#1A1A1A" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M26 54 Q27 60 26 66" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Nose + muzzle -->
  <ellipse cx="14" cy="57" rx="5" ry="4" fill="#F5D48A"/>
  <circle cx="13" cy="56" r="2" fill="#5D3A1A"/>
  <!-- Small solid black spots — NOT rosettes like leopard -->
  <circle cx="45" cy="53" r="3"   fill="#3E2000"/>
  <circle cx="55" cy="48" r="2.5" fill="#3E2000"/>
  <circle cx="64" cy="54" r="3"   fill="#3E2000"/>
  <circle cx="73" cy="50" r="2.5" fill="#3E2000"/>
  <circle cx="50" cy="63" r="2.5" fill="#3E2000"/>
  <circle cx="60" cy="67" r="3"   fill="#3E2000"/>
  <circle cx="70" cy="63" r="2.5" fill="#3E2000"/>
  <circle cx="38" cy="62" r="2"   fill="#3E2000"/>
  <!-- Ear -->
  <ellipse cx="30" cy="43" rx="6" ry="7" fill="#D4A843"/>
  <ellipse cx="30" cy="43" rx="3.5" ry="4.5" fill="#E8C46A"/>
</svg>
