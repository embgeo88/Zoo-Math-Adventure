<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Quokka: world's happiest animal — round teddy-bear face, PERMANENT SMILE, small compact marsupial -->
  <!-- Body — round and compact -->
  <ellipse cx="50" cy="70" rx="22" ry="18" fill="#A1887F"/>
  <!-- Head — large and round, key to its cute look -->
  <ellipse cx="50" cy="44" rx="22" ry="20" fill="#A1887F"/>
  <!-- Rounded ears — not pointy -->
  <ellipse cx="30" cy="27" rx="9" ry="11" fill="#8D6E63"/>
  <ellipse cx="70" cy="27" rx="9" ry="11" fill="#8D6E63"/>
  <ellipse cx="30" cy="28" rx="6" ry="8"  fill="#FFCCBC"/>
  <ellipse cx="70" cy="28" rx="6" ry="8"  fill="#FFCCBC"/>
  <!-- Warm face / cheek area -->
  <ellipse cx="50" cy="48" rx="16" ry="14" fill="#BCAAA4"/>
  <!-- Eyes — wide, friendly -->
  <circle cx="40" cy="40" r="6" fill="#1A1A1A"/>
  <circle cx="38.5" cy="38.5" r="2"   fill="white"/>
  <circle cx="60" cy="40" r="6" fill="#1A1A1A"/>
  <circle cx="58.5" cy="38.5" r="2"   fill="white"/>
  <!-- Nose — soft pink -->
  <ellipse cx="50" cy="51" rx="4.5" ry="3.5" fill="#EF9A9A"/>
  <!-- THE FAMOUS QUOKKA SMILE — upturned mouth corners -->
  <path d="M40 57 Q50 64 60 57" stroke="#6D4C41" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smile corners turned up -->
  <path d="M40 57 Q37 55 38 52" stroke="#6D4C41" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M60 57 Q63 55 62 52" stroke="#6D4C41" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M30 68 Q20 74 18 80" stroke="#8D6E63" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M70 68 Q80 74 82 80" stroke="#8D6E63" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Feet -->
  <ellipse cx="42" cy="88" rx="8" ry="5" fill="#8D6E63"/>
  <ellipse cx="58" cy="88" rx="8" ry="5" fill="#8D6E63"/>
  <!-- Short tail -->
  <path d="M58 82 Q68 84 70 90" stroke="#8D6E63" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
