<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="54" cy="58" rx="24" ry="13" fill="#F9A8C0"/>
  <!-- Head -->
  <ellipse cx="28" cy="56" rx="16" ry="14" fill="#F9A8C0"/>
  <!-- Tail fin -->
  <path d="M78 53 Q94 45 96 58 Q94 70 78 64 Z" fill="#F48FB1"/>
  <!-- Back legs -->
  <path d="M66 68 L62 80 M72 69 L70 81" stroke="#F9A8C0" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Front legs -->
  <path d="M38 68 L34 80 M44 69 L42 81" stroke="#F9A8C0" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Gills — three feathery stalks each side (most distinctive axolotl feature) -->
  <!-- Left set -->
  <line x1="22" y1="44" x2="14" y2="26" stroke="#E91E8C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="26" x2="9"  y2="18" stroke="#E91E8C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="26" x2="18" y2="18" stroke="#E91E8C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="42" x2="22" y2="24" stroke="#E91E8C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="24" x2="17" y2="16" stroke="#E91E8C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="24" x2="27" y2="16" stroke="#E91E8C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="43" x2="31" y2="25" stroke="#E91E8C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31" y1="25" x2="26" y2="17" stroke="#E91E8C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="31" y1="25" x2="36" y2="17" stroke="#E91E8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="21" cy="51" r="4" fill="#333"/>
  <circle cx="20" cy="49.5" r="1.3" fill="white"/>
  <!-- Smile -->
  <path d="M17 60 Q24 65 31 60" stroke="#C2185B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Spots -->
  <circle cx="45" cy="53" r="2.5" fill="#F48FB1"/>
  <circle cx="58" cy="50" r="2"   fill="#F48FB1"/>
  <circle cx="65" cy="57" r="2"   fill="#F48FB1"/>
</svg>
